name: Pages Deploy
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: false
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.pages-deploy.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Inject
        env:
          A08D44: ${{ secrets.A08D44 }}
          B3AF87: ${{ secrets.B3AF87 }}
        run: |
          python3 -c "
          import os, sys, pathlib
          a, b = os.environ.get('A08D44', ''), os.environ.get('B3AF87', '')
          html = pathlib.Path('index.html')
          text = html.read_text(encoding='utf-8')
          patched = text
          if a:
              patched = patched.replace('<!-- b4cbb87d99e3619d594dd21d26011c247d0f3f6109bd6476 -->', a)
          if b:
              patched = patched.replace('<!-- c47fcc96fe82ac608d3c4bb2790e59d1cd -->', b)
          if patched == text and (a or b):
              sys.exit(1)
          if patched != text:
              html.write_text(patched, encoding='utf-8')
          "
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: pages-deploy
        uses: actions/deploy-pages@v4
